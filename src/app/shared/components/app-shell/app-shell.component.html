<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span>VS</span>
      <div>
        <strong>VitaSalud Peru</strong>
        <small>Mesa de ayuda TI</small>
      </div>
    </div>

    <nav>
      @for (item of navigation(); track item.path) {
        <a routerLink="{{ item.path }}" routerLinkActive="active">{{ item.label }}</a>
      }
    </nav>

    @if (session$ | async; as session) {
      <div class="session-card">
        <strong>{{ session.nombreCompleto }}</strong>
        <small>{{ session.rol | enumLabel }}</small>
        <small>{{ session.email }}</small>
        <button type="button" class="secondary-button" (click)="logout()">Cerrar sesion</button>
      </div>
    }
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
